<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biblioteca</title>
<link rel="stylesheet" href="estilo.css">
</head>
<body>
  <!-- Corredor / cenário -->
  <div class="hall">
    <div class="bgwall"></div>
    <div class="shelf esq"></div>
    <div class="shelf dir"></div>
    <div class="books-deco"></div>
    <div class="floor"></div>
  </div>

  <!-- ESTANTE: escolha do livro -->
  <section id="estante" class="estante">
    <h1 class="titulo">Biblioteca</h1>
    <p class="subtitulo">Escolha um livro para abrir</p>
    <div id="prateleira" class="prateleira"></div>
    <p id="estanteVazia" class="vazia" hidden>
      Nenhum livro ainda. Adicione arquivos <b>.pdf</b> na pasta <b>Livros</b> do repositório.
    </p>
  </section>

  <!-- LEITOR: livro aberto -->
  <section id="leitor" class="leitor" hidden>
    <button id="voltar" class="voltar" aria-label="Voltar à estante">
      &#8592; estante
    </button>
    <div id="tituloLivro" class="faixa-titulo"></div>

    <div class="palco" id="palco">
      <div class="book" id="book">
        <div class="board"></div>
        <div class="pagina left"><img id="imgLeft" alt=""></div>
        <div class="pagina right"><img id="imgRight" alt=""></div>
        <div class="flipper" id="flipper">
          <div class="face front"><img id="imgFront" alt=""><div class="shade"></div></div>
          <div class="face back"><img id="imgBack" alt=""><div class="shade"></div></div>
        </div>
        <div class="spine"></div>
      </div>
    </div>

    <div class="nav">
      <button id="prev" class="rd" aria-label="Página anterior">&#8249;</button>
      <span id="contador" class="contador">capa</span>
      <button id="next" class="rd" aria-label="Próxima página">&#8250;</button>
    </div>
    <div class="dica">use as setas &#8592; &#8594; do teclado &nbsp;·&nbsp; clique nas laterais do livro</div>
    <div id="carregando" class="carregando" hidden>carregando páginas…</div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="config.js"></script>
  <script src="leitor.js"></script>
</body>
</html>
