<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BibliChaos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="estilo.css">
</head>
<body>

  <!-- ESTANTE -->
  <section id="estante" class="estante">
    <!-- cenario (desktop: quarto mid-century) -->
    <div class="cena" aria-hidden="true">
      <div class="parede"></div>
      <div class="piso"></div>
    </div>

    <div class="conteudo">
      <p class="eyebrow">acervo &middot; Chaos arq&amp;Art</p>
      <h1 class="brand-mobile">Bibli<i>Chaos</i></h1>

      <div class="busca">
        <input id="busca" type="search" placeholder="Buscar livro pelo nome&hellip;"
               autocomplete="off" spellcheck="false" aria-label="Buscar livro pelo nome">
      </div>

      <!-- desktop: estante de madeira com livros de lombada -->
      <div id="caseDesktop" class="case"></div>

      <!-- celular: grade de capas -->
      <div id="gridMobile" class="prateleira"></div>

      <p id="estanteVazia" class="vazia" hidden>
        Nenhum livro ainda. Adicione arquivos <b>.pdf</b> na pasta <b>Livros</b> do repositorio.
      </p>
      <p id="semResultado" class="vazia" hidden>Nenhum livro encontrado com esse nome.</p>
    </div>
  </section>

  <!-- LEITOR -->
  <section id="leitor" class="leitor" hidden>
    <button id="voltar" class="voltar" aria-label="Voltar a estante">&#8592; estante</button>
    <div id="tituloLivro" class="faixa-titulo"></div>

    <div class="palco" id="palco">
      <div class="book" id="book">
        <div class="board"></div>
        <div class="pagina left"><img id="imgLeft" alt=""></div>
        <div class="pagina right"><img id="imgRight" alt=""></div>
        <div class="pagina solo"><img id="imgSoloA" alt=""><img id="imgSoloB" alt=""></div>
        <div class="flipper" id="flipper">
          <div class="face front"><img id="imgFront" alt=""><div class="shade"></div></div>
          <div class="face back"><img id="imgBack" alt=""><div class="shade"></div></div>
        </div>
        <div class="spine"></div>
      </div>
    </div>

    <div class="nav">
      <button id="prev" class="rd" aria-label="Pagina anterior">&#8249;</button>
      <span id="contador" class="contador">capa</span>
      <button id="next" class="rd" aria-label="Proxima pagina">&#8250;</button>
    </div>
    <div class="dica">use as setas &#8592; &#8594; do teclado &nbsp;&middot;&nbsp; clique nas laterais do livro</div>
    <div id="carregando" class="carregando" hidden>carregando paginas&hellip;</div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="config.js"></script>
  <script src="leitor.js"></script>
</body>
</html>
